<section class="dashboard-page">
  <div class="dashboard-container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-content">
        <h1 class="logo">🎵 Gestor de Coleções</h1>
        <div class="navbar-right">
          <span class="username">{{ username }}</span>
          <button class="logout-btn" (click)="onLogout()">Logout</button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <div class="welcome-section">
        <h2>Bem-vindo, {{ username }}! 🎉</h2>
        <p>Explore artistas, álbuns e gerencie sua coleção musical.</p>
      </div>

      <!-- Features Grid -->
      <div class="features-grid">
        <!-- Pesquisar Artistas -->
        <div class="feature-card">
          <div class="card-icon">🎤</div>
          <h3>Pesquisar Artistas</h3>
          <p>Procure artistas por nome e descubra seus álbuns.</p>
          <a [routerLink]="['/search']" class="card-link">Ir para Pesquisa</a>
        </div>

        <!-- Ver Perfil -->
        <div class="feature-card">
          <div class="card-icon">👤</div>
          <h3>Perfil</h3>
          <p>Visualize as suas informações pessoais.</p>
          <a [routerLink]="['/profile']" class="card-link">Ver Perfil</a>
        </div>

      </div>
    </div>
  </div>
</section>
